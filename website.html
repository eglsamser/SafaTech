<head>

<link rel="canonical" href="https://safatechhub.in/website.html">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SAFA TECH | Coming Soon</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');

    :root {
      --black: #050505;
      --dark-black: #0b0b0b;
      --card-black: #111111;
      --gold: #d4af37;
      --light-gold: #ffd700;
      --soft-gold: #f5d76e;
      --white: #ffffff;
      --gray: #cfcfcf;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.18), transparent 35%),
        linear-gradient(135deg, var(--black), var(--dark-black));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      overflow: hidden;
    }

    .coming-soon-box {
      text-align: center;
      padding: 45px 30px;
      max-width: 650px;
      width: 90%;
      background: rgba(17, 17, 17, 0.85);
      border: 1px solid rgba(212, 175, 55, 0.35);
      border-radius: 25px;
      box-shadow: 0 0 35px rgba(212, 175, 55, 0.18);
      position: relative;
    }

    .coming-soon-box::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 25px;
      background: linear-gradient(120deg, transparent, var(--gold), transparent);
      z-index: -1;
      animation: glow 3s linear infinite;
      opacity: 0.35;
    }

    @keyframes glow {
      0% {
        filter: hue-rotate(0deg);
      }
      100% {
        filter: hue-rotate(360deg);
      }
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(38px, 8vw, 72px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 18px;
      background: linear-gradient(90deg, var(--gold), var(--soft-gold), var(--white));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 17px;
      color: var(--gray);
      line-height: 1.7;
    }

    .loader {
      width: 70px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      margin: 28px auto 0;
      overflow: hidden;
    }

    .loader span {
      display: block;
      width: 40%;
      height: 100%;
      background: var(--gold);
      border-radius: 50px;
      animation: loading 1.5s infinite ease-in-out;
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(260%);
      }
    }

    @media (max-width: 500px) {
      .coming-soon-box {
        padding: 35px 20px;
      }

      .brand {
        font-size: 18px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <header class="header">
        <a href="index.html" class="logo">
            <img src="images/logo.png" class="logo-img">
        </a>
    </header>
  
  <div class="coming-soon-box">
<div class="brand"><a href="index.html" class="coming-soon-box">Home</a></div>
    
    <div class="brand">SAFA TECH</div>
    <h1> Coming Soon</h1>
    <p>
      We are updating our website  services, and details.
    </p>
    <a href="index.html" class="coming-soon-box">Home</a>  
    <div class="loader">

      <span></span>
    </div>
  </div>
</body>
</html>
